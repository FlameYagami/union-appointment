spring:
  # 引入通用配置
  config:
    import:
      - application-framework-common.yml
  # 数据源配置
  datasource:
    dynamic:
      primary: mysql # 设置默认的数据源或者数据源组，默认值即为 master
      strict: false
      datasource:
        # 主库数据源
        mysql:
          url: jdbc:mysql://47.107.30.113:3306/union_appointment?useUnicode=true&characterEncoding=utf8&zeroDateTimeBehavior=convertToNull&useSSL=true&serverTimezone=GMT%2B8&rewriteBatchedStatements=true
          username: root
          # 用ENC将密码包裹起来
          password: Flame4985216#
          driver-class-name: com.mysql.cj.jdbc.Driver
        # 从库数据源
#        oracle:
#          url: jdbc:oracle:thin:@192.168.0.88:1521:orcl
#          username: test
#          password: gkkj1009
#          driver-class-name: oracle.jdbc.OracleDriver

  # Redis缓存库配置
  redis:
    # 地址
    host: localhost
    # 端口，默认为6379
    port: 6379
    # 数据库索引
    database: 15
    # 密码
    password:
    # 连接超时时间
    timeout: 60s
    lettuce:
      pool:
        # 连接池中的最小空闲连接
        min-idle: 1
        # 连接池中的最大空闲连接
        max-idle: 8
        # 连接池的最大数据库连接数
        max-active: 8
        # #连接池最大阻塞等待时间（使用负值表示没有限制）
        max-wait: -1ms

# 定时任务
powerjob:
  worker:
    enabled: false
    app-name: union-appointment
    server-address: 192.168.0.240:7700
    protocol: http
    store-strategy: disk

# 开发环境 数据库操作打印sql
logging:
  level:
    com.gk: debug


